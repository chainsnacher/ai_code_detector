name: Build & Deploy

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Debug step to confirm file location in the runner
    - name: List files for debugging
      run: ls -R

    - name: Cache pip
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added check to ensure requirements.txt exists before installing
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
        else
          echo "requirements.txt not found in root!" && exit 1
        fi
        pip install build twine

    - name: Build distribution
      run: python -m build

    - name: Check distribution
      run: twine check dist/*

    - name: Build Docker image
      run: docker build -t ai-code-detector:latest .

    - name: Publish to Docker Hub (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker tag ai-code-detector:latest ${{ secrets.DOCKER_USERNAME }}/ai-code-detector:${{ github.ref_name }}
        docker push ${{ secrets.DOCKER_USERNAME }}/ai-code-detector:${{ github.ref_name }}

    - name: Publish to PyPI (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
